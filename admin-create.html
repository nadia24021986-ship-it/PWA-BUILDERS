<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Buat Soal Seminar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 rounded-xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Buat Pertanyaan Baru</h2>
        
        <form id="questionForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Pertanyaan</label>
                <textarea id="questionText" required rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Tulis soal di sini..."></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tipe Soal</label>
                <select id="questionType" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="multiple_choice">Pilihan Ganda (A, B, C, D)</option>
                    <option value="text">Isian Singkat</option>
                </select>
            </div>

            <div id="optionsContainer" class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">Pilihan Opsi</label>
                <input type="text" id="optA" placeholder="Opsi A" class="w-full px-3 py-2 border rounded-lg text-sm">
                <input type="text" id="optB" placeholder="Opsi B" class="w-full px-3 py-2 border rounded-lg text-sm">
                <input type="text" id="optC" placeholder="Opsi C" class="w-full px-3 py-2 border rounded-lg text-sm">
                <input type="text" id="optD" placeholder="Opsi D" class="w-full px-3 py-2 border rounded-lg text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Kunci Jawaban Benar</label>
                <input type="text" id="correctAnswer" required placeholder="Contoh: Opsi A atau kata kunci isian" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <p class="text-xs text-gray-400 mt-1">*Jika Pilihan Ganda, ketik persis sama dengan salah satu opsi di atas.</p>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition shadow">
                Simpan Soal
            </button>
        </form>
    </div>

    <script>
        const questionType = document.getElementById('questionType');
        const optionsContainer = document.getElementById('optionsContainer');
        const form = document.getElementById('questionForm');

        // Sembunyikan/munculkan opsi pilihan ganda tergantung tipe yang dipilih
        questionType.addEventListener('change', (e) => {
            if (e.target.value === 'text') {
                optionsContainer.classList.add('hidden');
            } else {
                optionsContainer.classList.remove('hidden');
            }
        });

        // Logika kirim data ke backend Vercel nanti
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const type = questionType.value;
            const text = document.getElementById('questionText').value;
            const correct = document.getElementById('correctAnswer').value;
            
            let options = null;
            if (type === 'multiple_choice') {
                options = [
                    document.getElementById('optA').value,
                    document.getElementById('optB').value,
                    document.getElementById('optC').value,
                    document.getElementById('optD').value
                ];
            }

            try {
                const response = await fetch('/api/questions-create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, type, options, correct })
                });

                if (response.ok) {
                    alert('Soal berhasil disimpan ke database!');
                    form.reset();
                } else {
                    alert('Gagal menyimpan soal.');
                }
            } catch (error) {
                console.error(error);
                alert('Terjadi kesalahan koneksi.');
            }
        });
    </script>
</body>
</html>
